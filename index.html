<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Niko Auto Core USA - Customer Price Search</title>
  <style>
    :root{--bg:#0d1117;--card:#161b22;--text:#f0f6fc;--muted:#8b949e;--gold:#d4a017;--line:#30363d;--green:#2ea043;--red:#f85149}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#06080b,#111827);color:var(--text);min-height:100vh}.wrap{max-width:920px;margin:0 auto;padding:24px}.brand{text-align:center;padding:30px 10px}.logo{font-size:38px;font-weight:900;letter-spacing:.5px}.tag{color:var(--muted);margin-top:10px;font-size:20px}.card{background:rgba(22,27,34,.96);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 18px 50px rgba(0,0,0,.35)}.search{display:flex;gap:12px;flex-wrap:wrap}input{flex:1;min-width:230px;border:1px solid var(--line);background:#0d1117;color:var(--text);font-size:23px;padding:18px;border-radius:16px;text-transform:uppercase;outline:none}button{border:0;border-radius:16px;background:var(--gold);color:#111;font-weight:900;padding:16px 28px;font-size:20px;cursor:pointer}.small{font-size:14px;color:var(--muted);margin-top:14px}.result{margin-top:22px;display:none}.priceBox{border:1px solid var(--line);border-radius:18px;padding:24px;background:#0d1117}.code{font-size:20px;color:var(--muted)}.price{font-size:56px;font-weight:900;color:var(--green);margin:10px 0}.notfound{color:var(--red);font-size:24px;font-weight:900}.list{margin-top:16px;display:grid;gap:9px}.row{display:flex;justify-content:space-between;gap:12px;padding:15px;background:#0d1117;border:1px solid var(--line);border-radius:13px}.row b{font-size:18px}.notice{margin-top:20px;padding:14px;border-radius:14px;background:#111827;border:1px solid var(--line);color:var(--muted);font-size:18px}.footer{text-align:center;color:var(--muted);font-size:14px;margin-top:24px}@media(max-width:650px){.logo{font-size:32px}.search{display:grid}button{width:100%}.price{font-size:48px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand"><div class="logo">NIKO AUTO CORE USA</div><div class="tag">Customer Price Search</div></div>
    <div class="card">
      <div class="search"><input id="q" placeholder="Type converter code..." autocomplete="off"><button onclick="searchNow()">Search</button></div>
      <div class="small" id="status">Loading customer price list...</div>
      <div class="result" id="result"></div>
      <div class="notice">Customers see code and price only. Market numbers, formulas, Pt, Pd, Rh, recovery and merge are hidden.</div>
    </div>
    <div class="footer">Prices are not hedged. Call Niko Auto Core USA to confirm before sale.</div>
  </div>
<script>
let PRICES=[];
const clean=s=>(s||'').toString().toUpperCase().replace(/[^A-Z0-9]/g,'');
const money=n=>'$'+Number(n||0).toLocaleString('en-US',{maximumFractionDigits:0});
function setStatus(t){document.getElementById('status').textContent=t}
async function loadPrices(){
  try{
    const r=await fetch('prices.json?cache='+Date.now(),{cache:'no-store'});
    if(!r.ok) throw new Error('prices.json not found');
    const j=await r.json();
    PRICES=Array.isArray(j)?j:(j.prices||[]);
    setStatus('Ready: '+PRICES.length.toLocaleString()+' prices loaded. Updated: '+(j.updated||'today'));
  }catch(e){setStatus('Price list not loaded. Please call 469-422-2777.');}
}
function searchNow(){
  const term=clean(document.getElementById('q').value), out=document.getElementById('result'); out.style.display='block';
  if(!PRICES.length){out.innerHTML='<div class="priceBox notfound">Price list not loaded yet.</div>';return}
  if(!term){out.innerHTML='<div class="priceBox notfound">Type a code first.</div>';return}
  let exact=PRICES.find(x=>(x.search||clean(x.code||x.product))===term);
  let matches=PRICES.filter(x=>{let s=x.search||clean(x.code||x.product);return s.includes(term)||term.includes(s)}).slice(0,12);
  if(exact){let c=exact.code||exact.product;out.innerHTML='<div class="priceBox"><div class="code">Code: '+c+'</div><div class="price">'+money(exact.price)+'</div><div class="small">Current customer price</div></div>';return}
  if(matches.length){out.innerHTML='<div class="priceBox"><div class="notfound">No exact match. Similar codes:</div><div class="list">'+matches.map(x=>'<div class="row"><b>'+(x.code||x.product)+'</b><strong>'+money(x.price)+'</strong></div>').join('')+'</div></div>';return}
  out.innerHTML='<div class="priceBox notfound">No price found for this code.</div>';
}
document.getElementById('q').addEventListener('input',()=>{if(document.getElementById('q').value.length>=2)searchNow()});
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')searchNow()});
loadPrices();
</script>
</body>
</html>
